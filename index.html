
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Larisa & John — Red, White, & We Do!</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{
  --red:#c0273a;
  --blue:#2d4a8a;
  --ltblue:#5b7ec5;
  --white:#ffffff;
  --offwhite:#f7f7fb;
  --text:#1a1a2e;
  --light:#6b7a9e;
}

*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--offwhite);
  font-family:'Montserrat',sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

/* ───────────────────────── */
/* FIREWORKS BACKGROUND */
/* ───────────────────────── */

.fireworks-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

/* ───────────────────────── */
/* HERO */
/* ───────────────────────── */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 24px 80px;
  z-index:1;
  overflow:hidden;
}

.hero::before{
  content:'';
  position:absolute;
  width:550px;
  height:550px;
  background:
    radial-gradient(circle,
    rgba(91,126,197,.12) 0%,
    transparent 70%);
  z-index:-1;
}

.tagline{
  line-height:1.1;
  margin-bottom:28px;
  opacity:0;
  animation:fadeUp .9s ease .2s forwards;
}

.tagline-red,
.tagline-white,
.tagline-wedo{
  display:block;
  font-family:'Dancing Script',cursive;
  font-size:clamp(2.8rem,9vw,5.5rem);
}

.tagline-red{color:var(--red);}
.tagline-white{color:var(--ltblue);}
.tagline-wedo{color:var(--blue);}

.invite-line{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--light);
  margin-bottom:16px;
  opacity:0;
  animation:fadeUp .9s ease .5s forwards;
}

.couple-names{
  font-family:'Dancing Script',cursive;
  font-size:clamp(3.5rem,11vw,7rem);
  font-weight:700;
  color:var(--blue);
  line-height:1;
  opacity:0;
  animation:fadeUp .9s ease .7s forwards;
  text-shadow:2px 2px 0 rgba(45,74,138,.12);
}

/* ───────────────────────── */
/* STARS */
/* ───────────────────────── */

.stars-row{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
  margin:20px 0;
  opacity:0;
  animation:fadeUp .9s ease .9s forwards;
}

.star{
  width:18px;
  height:18px;
  fill:var(--ltblue);
}

.star.red{
  fill:var(--red);
}

.star.big{
  width:26px;
  height:26px;
  animation:floaty 3s ease-in-out infinite;
}

/* ───────────────────────── */
/* HERO DETAILS */
/* ───────────────────────── */

.details-hero{
  opacity:0;
  animation:fadeUp .9s ease 1.1s forwards;
  text-align:center;
}

.detail-date{
  font-weight:700;
  font-size:clamp(1rem,3vw,1.25rem);
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:10px;
}

.detail-times{
  font-weight:600;
  font-size:clamp(.85rem,2.5vw,1rem);
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--blue);
  line-height:2;
  margin-bottom:16px;
}

.detail-venue{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.3rem,3.5vw,1.8rem);
  color:var(--red);
  line-height:1.5;
  margin-bottom:12px;
}

.detail-address{
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:10px;
}

.detail-rsvp{
  font-size:.85rem;
  color:var(--ltblue);
  letter-spacing:.06em;
}

/* ───────────────────────── */
/* COUNTDOWN */
/* ───────────────────────── */

.countdown-section{
  position:relative;
  z-index:1;
  padding:60px 24px;
  text-align:center;
  background:
  linear-gradient(
    180deg,
    transparent,
    rgba(45,74,138,.05) 40%,
    rgba(45,74,138,.05) 60%,
    transparent
  );
}

.section-eyebrow{
  font-size:.68rem;
  font-weight:700;
  letter-spacing:.35em;
  text-transform:uppercase;
  color:var(--red);
  margin-bottom:32px;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:clamp(12px,4vw,40px);
  flex-wrap:wrap;
}

.count-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.count-number{
  font-family:'Dancing Script',cursive;
  font-size:clamp(3.5rem,9vw,6rem);
  font-weight:700;
  line-height:1;
  color:var(--blue);
  min-width:90px;
}

.count-label{
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--light);
}

.count-sep{
  font-size:3rem;
  color:var(--red);
  line-height:1;
  align-self:flex-start;
  padding-top:10px;
}

/* ───────────────────────── */
/* CARDS */
/* ───────────────────────── */

.details-section{
  position:relative;
  z-index:1;
  padding:40px 24px 60px;
  max-width:960px;
  margin:0 auto;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-top:4px solid var(--blue);
  border-radius:3px;
  padding:32px 24px;
  text-align:center;
  box-shadow:0 2px 16px rgba(45,74,138,.08);
  transition:.25s ease;
}

.card:nth-child(2){
  border-top-color:var(--red);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 28px rgba(45,74,138,.14);
}

.card-icon{
  font-size:2rem;
  margin-bottom:12px;
}

.card-title{
  font-weight:700;
  font-size:.75rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:12px;
}

.card:nth-child(2) .card-title{
  color:var(--red);
}

.card-body{
  font-size:.88rem;
  font-weight:300;
  color:var(--light);
  line-height:1.9;
}

/* ───────────────────────── */
/* REGISTRY */
/* ───────────────────────── */

.registry-section{
  position:relative;
  z-index:1;
  padding:30px 24px 80px;
  max-width:1000px;
  margin:0 auto;
  text-align:center;
}

.registry-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.registry-card{
  background:white;
  border-top:4px solid var(--blue);
  border-radius:3px;
  padding:36px 28px;
  box-shadow:0 2px 16px rgba(45,74,138,.08);
  transition:.25s ease;
}

.registry-card:nth-child(2){
  border-top-color:var(--red);
}

.registry-card:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 28px rgba(45,74,138,.14);
}

.registry-icon{
  font-size:2.2rem;
  margin-bottom:16px;
}

.registry-name{
  font-size:.9rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:16px;
}

.registry-card:nth-child(2) .registry-name{
  color:var(--red);
}

.registry-copy{
  font-size:.9rem;
  line-height:1.9;
  color:var(--light);
  margin-bottom:24px;
}

.registry-btn{
  display:inline-block;
  text-decoration:none;
  padding:14px 28px;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  border-radius:2px;
  transition:.2s ease;
}

.registry-btn.amazon{
  background:var(--blue);
  color:white;
}

.registry-btn.amazon:hover{
  background:var(--ltblue);
  transform:translateY(-2px);
}

.registry-btn.macys{
  background:var(--red);
  color:white;
}

.registry-btn.macys:hover{
  background:#d63b4f;
  transform:translateY(-2px);
}

/* ───────────────────────── */
/* GIFT SECTION */
/* ───────────────────────── */

.gift-section{
  position:relative;
  z-index:1;
  padding:70px 24px 90px;
  text-align:center;
  max-width:900px;
  margin:0 auto;
}

.gift-heading{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2.2rem,5vw,3.5rem);
  color:var(--blue);
  margin-bottom:16px;
}

.gift-sub{
  font-size:.92rem;
  line-height:1.9;
  color:var(--light);
  max-width:420px;
  margin:0 auto 30px;
}

.qr-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.qr-frame{
  position:relative;
  background:white;
  padding:16px;
  border:2px solid rgba(45,74,138,.12);
  box-shadow:0 4px 18px rgba(45,74,138,.08);
}

.qr-star{
  position:absolute;
  width:14px;
  height:14px;
}

.qr-star.tl{top:-8px;left:-8px;}
.qr-star.tr{top:-8px;right:-8px;}
.qr-star.bl{bottom:-8px;left:-8px;}
.qr-star.br{bottom:-8px;right:-8px;}

#qrcode canvas,
#qrcode img{
  display:block;
}

.venmo-handle{
  font-family:'Dancing Script',cursive;
  font-size:1.5rem;
  color:var(--blue);
}

.venmo-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#3d95ce;
  color:white;
  text-decoration:none;
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:.78rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:13px 30px;
  border-radius:2px;
  border:2px solid transparent;
  transition:.25s ease;
}

.venmo-btn:hover{
  background:#2e7ab5;
  transform:translateY(-2px);
  border-color:var(--blue);
}

/* ───────────────────────── */
/* FOOTER */
/* ───────────────────────── */

footer{
  position:relative;
  z-index:1;
  text-align:center;
  padding:40px 24px 60px;
  background:var(--blue);
  color:white;
}

.footer-tagline{
  font-family:'Dancing Script',cursive;
  font-size:2rem;
  color:white;
  margin-bottom:10px;
}

.footer-date{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,.6);
}

/* ───────────────────────── */
/* REVEAL ANIMATIONS */
/* ───────────────────────── */

.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all .8s ease;
}

.reveal.visible{
  opacity:1;
  transform:translateY(0);
}

/* ───────────────────────── */
/* ANIMATIONS */
/* ───────────────────────── */

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes floaty{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-6px);
  }
}

/* ───────────────────────── */
/* MOBILE */
/* ───────────────────────── */

@media(max-width:600px){

  .count-number{
    min-width:auto;
    font-size:3rem;
  }

  .countdown{
    gap:10px;
  }

}

@media(max-width:480px){
  .count-sep{
    display:none;
  }
}

</style>
</head>

<body>

<script>

/* ───────────────────────── */
/* FIREWORKS */
/* ───────────────────────── */

const SEEN = 'larisaandjohn_seen';

if(!localStorage.getItem(SEEN)){

  localStorage.setItem(SEEN,'1');

  const fw = document.createElement('canvas');

  fw.style.cssText = `
    position:fixed;
    inset:0;
    z-index:9999;
    pointer-events:none;
    transition:opacity .8s;
  `;

  fw.width = window.innerWidth;
  fw.height = window.innerHeight;

  document.body.appendChild(fw);

  const fc = fw.getContext('2d');

  const W = fw.width;
  const H = fw.height;

  const PAL = ['#ff3333','#ffffff','#3355ff'];

  let pts = [];
  let rks = [];
  let running = true;

  function mkP(x,y,c,a,s){
    return{
      x,y,c,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      al:1,
      dc:Math.random()*.018+.014,
      sz:Math.random()*3+1.5
    };
  }

  function mkR(x){
    return{
      x:x ?? W*.15+Math.random()*W*.7,
      y:H+10,
      ty:H*.08+Math.random()*H*.4,
      sp:Math.random()*3+11,
      tr:[]
    };
  }

  function explode(x,y){

    for(let i=0;i<110;i++){

      pts.push(
        mkP(
          x,
          y,
          PAL[i%3],
          (i/110)*Math.PI*2,
          Math.random()*5+2
        )
      );

    }

  }

  function loop(){

    if(!running) return;

    requestAnimationFrame(loop);

    fc.fillStyle='rgba(0,0,0,.15)';
    fc.fillRect(0,0,W,H);

    rks = rks.filter(r=>{

      r.tr.push({x:r.x,y:r.y});

      if(r.tr.length>10) r.tr.shift();

      r.y -= r.sp;

      r.tr.forEach((t,i)=>{

        fc.beginPath();

        fc.arc(
          t.x,
          t.y,
          (i/r.tr.length)*2,
          0,
          Math.PI*2
        );

        fc.fillStyle=
        `rgba(255,240,150,${(i/r.tr.length)*.6})`;

        fc.fill();

      });

      if(r.y <= r.ty){

        explode(r.x,r.y);

        return false;

      }

      return true;

    });

    pts = pts.filter(p=>{

      p.x += p.vx;
      p.y += p.vy;
      p.vy += .06;
      p.al -= p.dc;

      fc.beginPath();

      fc.arc(
        p.x,
        p.y,
        p.sz,
        0,
        Math.PI*2
      );

      fc.globalAlpha = Math.max(0,p.al);

      fc.fillStyle = p.c;

      fc.fill();

      fc.globalAlpha = 1;

      return p.al > 0;

    });

  }

  [0,120,240,360,480,600,720,840,960,1100]
  .forEach(t=>setTimeout(()=>rks.push(mkR()),t));

  loop();

  setTimeout(()=>{

    running = false;

    fw.style.opacity='0';

    setTimeout(()=>fw.remove(),900);

  },2600);

}

/* ───────────────────────── */
/* COUNTDOWN */
/* ───────────────────────── */

const WEDDING_DATE =
new Date(2026,6,2,17,0,0);

function updateCountdown(){

  const diff = WEDDING_DATE - new Date();

  if(diff <= 0){

    document.querySelector('.countdown-section')
    .innerHTML = `
      <p class="section-eyebrow"
      style="font-size:1.1rem;color:var(--red);">
      Today is the day! 🎇
      </p>
    `;

    return;

  }

  const days =
  Math.floor(diff / 864e5);

  const hours =
  Math.floor((diff % 864e5) / 36e5);

  const mins =
  Math.floor((diff % 36e5) / 6e4);

  const secs =
  Math.floor((diff % 6e4) / 1e3);

  document.getElementById('cd-days').textContent =
  String(days).padStart(2,'0');

  document.getElementById('cd-hours').textContent =
  String(hours).padStart(2,'0');

  document.getElementById('cd-mins').textContent =
  String(mins).padStart(2,'0');

  document.getElementById('cd-secs').textContent =
  String(secs).padStart(2,'0');

}

updateCountdown();

setInterval(updateCountdown,1000);

/* ───────────────────────── */
/* QR CODE */
/* ───────────────────────── */

new QRCode(
  document.getElementById('qrcode'),
  {
    text:'https://venmo.com/Larisa-Schumann',
    width:180,
    height:180,
    colorDark:'#2d4a8a',
    colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.H
  }
);

/* ───────────────────────── */
/* REVEAL ANIMATIONS */
/* ───────────────────────── */

const observer =
new IntersectionObserver(entries=>{

  entries.forEach(entry=>{

    if(entry.isIntersecting){

      entry.target.classList.add('visible');

    }

  });

},{
  threshold:.15
});

document
.querySelectorAll(
'.details-section,.registry-section,.gift-section,footer'
)
.forEach(el=>{

  el.classList.add('reveal');

  observer.observe(el);

});

/* ───────────────────────── */
/* VENMO CELEBRATION */
/* ───────────────────────── */

document
.querySelector('.venmo-btn')
.addEventListener('click',()=>{

  for(let i=0;i<20;i++){

    const confetti =
    document.createElement('div');

    confetti.style.position='fixed';
    confetti.style.width='8px';
    confetti.style.height='8px';
    confetti.style.borderRadius='50%';
    confetti.style.background=
      ['#c0273a','#2d4a8a','#5b7ec5','#ffffff']
      [Math.floor(Math.random()*4)];

    confetti.style.left =
      (window.innerWidth/2)+'px';

    confetti.style.top =
      (window.innerHeight/2)+'px';

    confetti.style.pointerEvents='none';
    confetti.style.zIndex='99999';

    document.body.appendChild(confetti);

    const x =
      (Math.random()-.5)*400;

    const y =
      (Math.random()-.5)*400;

    confetti.animate([
      {
        transform:'translate(0,0)',
        opacity:1
      },
      {
        transform:`translate(${x}px,${y}px)`,
        opacity:0
      }
    ],{
      duration:1200,
      easing:'cubic-bezier(.2,.8,.2,1)'
    });

    setTimeout(()=>confetti.remove(),1200);

  }

});

</script>
